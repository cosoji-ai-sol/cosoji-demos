function PdfPanel({title,sub,onClose}) {
  function renderHL() {
    const marks=[];
    BM_DEFECTS.forEach(d=>{const idx=RTEXT.indexOf(d.loc);if(idx!==-1)marks.push({start:idx,end:idx+d.loc.length,type:d.type,desc:d.desc});});
    marks.sort((a,b)=>a.start-b.start);
    const parts=[];let cur=0;
    marks.forEach(m=>{if(m.start<cur)return;if(m.start>cur)parts.push({text:RTEXT.slice(cur,m.start),hl:false});parts.push({text:RTEXT.slice(m.start,m.end),hl:true,type:m.type,desc:m.desc});cur=m.end;});
    if(cur<RTEXT.length)parts.push({text:RTEXT.slice(cur),hl:false});
    return parts;
  }
  return (
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex"}}>
      <div style={{flex:1,background:"rgba(0,0,0,0.45)"}} onClick={onClose}/>
      <div style={{width:500,background:C.white,height:"100%",display:"flex",flexDirection:"column",boxShadow:"-8px 0 32px rgba(0,0,0,0.18)"}}>
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fafbfc"}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:C.text}}>📄 レポート原文</div>
            <div style={{fontSize:11,color:C.text2,marginTop:2}}>{title} — {sub}</div>
          </div>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:6,border:`1px solid ${C.border}`,background:C.white,color:C.text2,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,background:C.bg,display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:11,color:C.text2,fontWeight:600}}>不具合ハイライト：</span>
          {[[C.redL,C.red,"数値異常"],[C.orangeL,C.orange,"記載漏れ"],[C.purpleL,C.purple,"フォーマット"]].map(([bg,bd,l])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:C.text2}}>
              <div style={{width:10,height:10,borderRadius:2,background:bg,border:`1px solid ${bd}`}}/>{l}
            </div>
          ))}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"18px 20px"}}>
          <div style={{fontSize:12,lineHeight:2.6,fontFamily:"monospace",whiteSpace:"pre-wrap",color:C.text}}>
            {renderHL().map((p,i)=>p.hl?(
              <span key={i} title={p.desc} style={{background:TC[p.type].bg,borderBottom:`2px solid ${TC[p.type].tc}`,color:TC[p.type].tc,borderRadius:3,padding:"1px 4px",cursor:"help",fontWeight:700}}>{p.text}</span>
            ):<span key={i}>{p.text}</span>)}
          </div>
        </div>
        <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`,background:"#fafbfc",display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1px solid ${C.border}`,background:C.white,color:C.text2,fontSize:12,fontWeight:600,cursor:"pointer"}}>閉じる</button>
          <button style={{flex:2,padding:"9px 0",borderRadius:8,border:"none",background:C.primary,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>📥 原文PDFをダウンロード</button>
        </div>
      </div>
    </div>
  );
}

function BulkUpload({showRaw}) {
  const [phase,setPhase]=useState("idle");
  const [progress,setProgress]=useState(0);
  const [checkIdx,setCheckIdx]=useState(-1);
  const [results,setResults]=useState([]);
  function startDemo(){
    if(phase!=="idle")return;
    setPhase("dropping");
    setTimeout(function(){
      setPhase("loading");let p=0;
      const t=setInterval(function(){p+=20;setProgress(p);if(p>=100){clearInterval(t);setPhase("loaded");}},200);
    },600);
  }
  function runCheck(){
    setPhase("checking");setCheckIdx(0);setResults([]);let i=0;
    const t=setInterval(function(){
      i++;setCheckIdx(i);
      setResults(function(prev){return [...prev,{...BULK_FILES[i-1],status:"チェック済"}];});
      if(i>=BULK_FILES.length){clearInterval(t);setPhase("done");}
    },600);
  }
  function reset(){setPhase("idle");setProgress(0);setCheckIdx(-1);setResults([]);}
  const totalDefects=results.reduce(function(s,f){return s+f.defects;},0);
  return (
    <Card style={{marginBottom:18}}>
      <CardHead title="一括アップロード（複数PDF）" right={phase==="done"?<button onClick={reset} style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:C.white,color:C.text2,fontSize:12,cursor:"pointer"}}>リセット</button>:null}/>
      {(phase==="idle"||phase==="dropping"||phase==="loading"||phase==="loaded")&&(
        <div onClick={startDemo} style={{margin:16,border:"2px dashed "+(phase==="loaded"?C.green:phase==="dropping"||phase==="loading"?C.primary:C.border),borderRadius:10,padding:24,textAlign:"center",background:phase==="loaded"?C.greenL:phase==="dropping"||phase==="loading"?C.primaryLL:C.bg,cursor:phase==="loaded"?"default":"pointer",transition:"all 0.3s"}}>
          {phase==="idle"&&<><div style={{fontSize:28,marginBottom:8}}>📂</div><div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>PDFをここにドロップ、またはクリックして選択</div><div style={{fontSize:11,color:C.text2}}>複数のBMレポートを一括でアップロードしてAIチェックできます</div></>}
          {phase==="dropping"&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}><Spinner/><span style={{fontSize:13,fontWeight:600,color:C.primary}}>ファイルを認識中...</span></div>}
          {phase==="loading"&&<div><div style={{fontSize:12,fontWeight:600,color:C.primary,marginBottom:10}}>PDFを読み込み中... {progress}%</div><div style={{background:C.primaryL,borderRadius:99,height:8,overflow:"hidden",width:"60%",margin:"0 auto"}}><div style={{height:"100%",borderRadius:99,background:C.primary,width:progress+"%",transition:"width 0.15s"}}/></div></div>}
          {phase==="loaded"&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}><span style={{fontSize:24}}>✅</span><div style={{textAlign:"left"}}><div style={{fontSize:13,fontWeight:700,color:C.green}}>5件のPDFの読み込みが完了しました</div><div style={{fontSize:11,color:C.text2,marginTop:2}}>丸の内パークビル / 新宿住友ビルディング / 渋谷スクランブルタワー 他2件</div></div></div>}
        </div>
      )}
      {(phase==="loaded"||phase==="checking"||phase==="done")&&(
        <div style={{padding:"0 16px 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:600,color:C.text}}>5件のファイル</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {phase==="done"&&totalDefects>0&&<Tag color={C.red} bg={C.redL}>合計 {totalDefects}件の不具合を検知</Tag>}
              {phase==="done"&&totalDefects===0&&<Tag color={C.green} bg={C.greenL}>すべて異常なし</Tag>}
              {(phase==="loaded"||phase==="checking")&&(
                <button onClick={runCheck} disabled={phase==="checking"} style={{padding:"6px 16px",borderRadius:8,border:"none",background:phase==="checking"?"#94a3b8":C.primary,color:"#fff",fontSize:12,fontWeight:700,cursor:phase==="checking"?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6}}>
                  {phase==="checking"&&<Spinner size={12} color="#fff" trackColor="rgba(255,255,255,0.3)"/>}
                  {phase==="checking"?"AIがチェック中...":"一括AIチェック実行"}
                </button>
              )}
            </div>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#fafbfc"}}>{["ファイル名","サイズ","ステータス","検知結果",""].map(h=><th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:700,color:C.text2,textAlign:"left",borderBottom:"1px solid "+C.border}}>{h}</th>)}</tr></thead>
            <tbody>
              {BULK_FILES.map(function(f,i){
                const res=results[i];const isChecking=phase==="checking"&&i===checkIdx-1;
                return (
                  <tr key={i} style={{borderBottom:"1px solid "+C.border2,background:isChecking?"#fffbf9":C.white,transition:"background 0.2s"}}>
                    <td style={{padding:"10px 12px",fontSize:12,color:C.text}}>📄 {f.name}</td>
                    <td style={{padding:"10px 12px",fontSize:12,color:C.text2}}>{f.size}</td>
                    <td style={{padding:"10px 12px"}}>
                      {isChecking&&<div style={{display:"flex",alignItems:"center",gap:6}}><Spinner size={12}/><span style={{fontSize:11,color:C.primary}}>チェック中</span></div>}
                      {!isChecking&&res&&<Tag color={C.green} bg={C.greenL}>チェック済</Tag>}
                      {!isChecking&&!res&&<Tag color={C.yellow} bg={C.yellowL}>待機中</Tag>}
                    </td>
                    <td style={{padding:"10px 12px"}}>
                      {res&&(res.defects>0?<Tag color={C.red} bg={C.redL}>{res.defects}件検知</Tag>:<Tag color={C.green} bg={C.greenL}>異常なし</Tag>)}
                      {!res&&<span style={{fontSize:12,color:C.text3}}>—</span>}
                    </td>
                    <td style={{padding:"10px 12px"}}>{res&&<button onClick={showRaw} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:6,border:"1px solid "+C.border,background:C.white,color:C.text2,fontSize:11,fontWeight:600,cursor:"pointer"}}>📄 原文確認</button>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </Card>
  );
}

function Issues({deptFilter,initialFilter}) {

    if(fSt==="open")    return ms&&md&&mt&&i.status!=="完了"&&i.status!=="修繕完了報告済";

        <select value={fSt} onChange={e=>setFSt(e.target.value)} style={{padding:"7px 12px",border:"1px solid "+C.border,borderRadius:8,fontSize:12,outline:"none",background:"#fff"}}>
          <option value="all">ステータス：すべて</option>
          <option value="open">未完了のみ</option>

          {STATUS_KEYS.map(k=><option key={k} value={k}>{k}</option>)}

        <select value={fTan} onChange={e=>setFTan(e.target.value)} style={{padding:"7px 12px",border:"1px solid "+C.border,borderRadius:8,fontSize:12,outline:"none",background:"#fff"}}>
          <option value="all">担当者：全員</option>

          {stalled.length>0&&<Tag color="#fff" bg={C.red} style={{padding:"4px 12px"}}>{stalled.length}件 放置アラート</Tag>}

      </div>
      <Card>
        <table style={{width:"100%",borderCollapse:"collapse"}}>

              return (
                <tr key={iss.id} style={{borderBottom:"1px solid "+C.border2,background:isStalled?"#fffbf9":C.white}}>

                  <td style={{padding:"10px 14px"}}><div style={{fontSize:12,color:C.text}}>{iss.title}</div>{iss.memo&&<div style={{fontSize:10,color:C.text2,marginTop:1}}>{iss.memo}</div>}</td>
                  <td style={{padding:"10px 14px"}}><Tag color={iss.sev==="high"?C.red:iss.sev==="medium"?C.orange:C.text2} bg={iss.sev==="high"?C.redL:iss.sev==="medium"?C.orangeL:C.border2}>{iss.sev==="high"?"重大":iss.sev==="medium"?"中程度":"軽微"}</Tag></td>
                  <td style={{padding:"10px 14px"}}><StatusTag status={iss.status}/></td>
                  <td style={{padding:"10px 14px"}}>{iss.days>0&&isStalled?<span style={{fontSize:11,fontWeight:700,color:iss.days>=7?C.red:C.orange,background:iss.days>=7?C.redL:C.orangeL,padding:"2px 8px",borderRadius:4}}>{iss.days}日</span>:<span style={{fontSize:11,color:C.text3}}>—</span>}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.text2,whiteSpace:"nowrap"}}>{iss.tan}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.text2,whiteSpace:"nowrap"}}>{iss.est}</td>
                  <td style={{padding:"10px 14px"}}>{isStalled&&<button onClick={()=>setNotifyTarget(iss)} style={{padding:"4px 12px",borderRadius:6,border:"none",background:C.red,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>通知</button>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

function BMCheck({deptFilter}) {
  const [propIdx,setPropIdx]=useState(0);
  const [inspType,setInspType]=useState("消防設備");
  const [filter,setFilter]=useState("all");
  const [expanded,setExpanded]=useState({});
  const [uploadMode,setUploadMode]=useState("single");
  const [showRaw,setShowRaw]=useState(false);
  const [reportText,setReportText]=useState("");
  const [analyzing,setAnalyzing]=useState(false);
  const [analyzed,setAnalyzed]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const [pdfLoaded,setPdfLoaded]=useState(false);
  const [pdfLoading,setPdfLoading]=useState(false);
  const fileRef=useRef();
  const props=BUILDINGS.filter(b=>deptFilter==="all"||b.dept===deptFilter).slice(0,6);
  const prop=props[propIdx]||props[0];
  const showDefects=analyzed&&prop&&prop.id===1;
  const filtered=BM_DEFECTS.filter(d=>filter==="all"||d.type===filter);

  function typeText(text){
    setReportText("");setAnalyzed(false);let i=0;
    const t=setInterval(function(){i+=3;setReportText(text.slice(0,i));if(i>=text.length){clearInterval(t);setReportText(text);}},8);
  }
  function handlePdfClick(){
    if(pdfLoaded||pdfLoading)return;
    setPdfLoading(true);
    setTimeout(function(){setPdfLoading(false);setPdfLoaded(true);typeText(RTEXT);},1200);
  }
  function runAnalyze(){
    if(!reportText.trim())setReportText(RTEXT);
    setAnalyzing(true);setAnalyzed(false);
    setTimeout(function(){setAnalyzing(false);setAnalyzed(true);},2200);
  }
  function switchProp(i){
    setPropIdx(i);setFilter("all");setExpanded({});
    setReportText("");setAnalyzed(false);setAnalyzing(false);
    setPdfLoaded(false);setPdfLoading(false);
  }
  function renderHL(){
    const marks=[];
    BM_DEFECTS.forEach(d=>{const idx=RTEXT.indexOf(d.loc);if(idx!==-1)marks.push({start:idx,end:idx+d.loc.length,type:d.type,desc:d.desc});});
    marks.sort((a,b)=>a.start-b.start);
    const parts=[];let cur=0;
    marks.forEach(m=>{if(m.start<cur)return;if(m.start>cur)parts.push({text:RTEXT.slice(cur,m.start),hl:false});parts.push({text:RTEXT.slice(m.start,m.end),hl:true,type:m.type,desc:m.desc});cur=m.end;});
    if(cur<RTEXT.length)parts.push({text:RTEXT.slice(cur),hl:false});
    return parts;
  }
  return (
    <div style={{padding:28}}>
      {showRaw&&<PdfPanel title={(prop||{}).name||""} sub={inspType+" — 2026年3月分"} onClose={()=>setShowRaw(false)}/>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <h1 style={{fontSize:20,fontWeight:800,color:C.text}}>BMレポートチェック</h1>
          {deptFilter!=="all"&&<DeptTag dept={deptFilter}/>}
        </div>
        <div style={{display:"flex",gap:6}}>
          {["single","bulk"].map(m=>(
            <button key={m} onClick={()=>setUploadMode(m)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(uploadMode===m?C.primary:C.border),background:uploadMode===m?C.primaryL:C.white,color:uploadMode===m?C.primary:C.text2,fontSize:12,fontWeight:uploadMode===m?700:400,cursor:"pointer"}}>
              {m==="single"?"1件チェック":"一括チェック"}
            </button>
          ))}
        </div>
      </div>
      {uploadMode==="bulk"&&<BulkUpload showRaw={()=>setShowRaw(true)}/>}
      {uploadMode==="single"&&(
        <div>
          <div style={{background:C.white,border:"1px solid "+C.border,borderRadius:12,padding:"12px 18px",marginBottom:18,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <span style={{fontSize:11,fontWeight:700,color:C.text2}}>建物：</span>
            {props.map((p,i)=>(
              <button key={i} onClick={()=>switchProp(i)} style={{padding:"5px 13px",borderRadius:20,border:"1px solid "+(i===propIdx?C.primary:C.border),background:i===propIdx?C.primaryL:C.white,color:i===propIdx?C.primary:C.text2,fontWeight:i===propIdx?700:400,fontSize:11,cursor:"pointer"}}>
                {p.name}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:0,marginBottom:18,borderBottom:"1px solid "+C.border,overflowX:"auto"}}>
            {INSP_TYPES.map(t=>(
              <button key={t} onClick={()=>setInspType(t)} style={{padding:"9px 18px",fontSize:12,fontWeight:600,color:inspType===t?C.primary:C.text2,background:"none",border:"none",borderBottom:inspType===t?"2px solid "+C.primary:"2px solid transparent",cursor:"pointer",marginBottom:-1,whiteSpace:"nowrap"}}>
                {t}{t==="消防設備"&&prop&&prop.id===1&&<span style={{marginLeft:6,fontSize:10,background:C.redL,color:C.red,padding:"1px 5px",borderRadius:10,fontWeight:700}}>3件</span>}
              </button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
            <Card>
              <CardHead title="レポート入力" right={<Tag color={C.primary} bg={C.primaryL}>PDF対応</Tag>}/>
              <div style={{padding:16}}>
                <div onDrop={e=>{e.preventDefault();setDragOver(false);handlePdfClick();}} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onClick={handlePdfClick}
                  style={{border:"2px dashed "+(pdfLoaded?C.green:dragOver?C.primary:C.border),borderRadius:10,padding:18,textAlign:"center",background:pdfLoaded?C.greenL:dragOver?C.primaryLL:C.bg,cursor:pdfLoaded?"default":"pointer",transition:"all 0.2s"}}>
                  {pdfLoading&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}><Spinner/><span style={{fontSize:12,color:C.primary,fontWeight:600}}>PDFを読み込み中...</span></div>}
                  {!pdfLoading&&!pdfLoaded&&<><div style={{fontSize:24,marginBottom:6}}>📄</div><div style={{fontSize:12,color:C.text2}}><strong style={{color:C.primary}}>PDFをここにドロップ</strong><br/>またはクリックして選択</div></>}
                  {!pdfLoading&&pdfLoaded&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}><span style={{fontSize:20}}>✅</span><div style={{textAlign:"left"}}><div style={{fontSize:12,fontWeight:700,color:C.green}}>PDFの読み込みが完了しました</div><div style={{fontSize:11,color:C.text2,marginTop:2}}>📄 {prop&&prop.name}_BMレポート_2026年3月.pdf</div></div></div>}
                  <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}}/>
                </div>
                <div style={{textAlign:"center",fontSize:11,color:C.text2,margin:"10px 0 6px"}}>または</div>

                <button onClick={runAnalyze} disabled={analyzing} style={{width:"100%",padding:12,background:analyzing?"#94a3b8":C.primary,border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:700,cursor:analyzing?"not-allowed":"pointer",marginTop:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  {analyzing&&<Spinner size={14} color="#fff" trackColor="rgba(255,255,255,0.3)"/>}
                  {analyzing?"AIが解析中...":"AIで内容チェックを実行する"}
                </button>
              </div>
            </Card>
            <Card>
              <CardHead title="AI検知結果" right={
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {showDefects&&<button onClick={()=>setShowRaw(true)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:8,border:"1px solid "+C.border,background:C.white,color:C.text2,fontSize:11,fontWeight:600,cursor:"pointer"}}>📄 レポート原文を確認</button>}
                  <Tag color={!analyzed?"#94a3b8":showDefects?C.red:C.green} bg={!analyzed?C.border2:showDefects?C.redL:C.greenL}>
                    {!analyzed?"未実行":showDefects?BM_DEFECTS.length+"件検知":"異常なし"}
                  </Tag>
                </div>
              }/>
              <div style={{padding:14}}>
                {analyzing&&<div style={{textAlign:"center",padding:40}}><div style={{width:36,height:36,border:"3px solid "+C.primaryL,borderTopColor:C.primary,borderRadius:"50%",animation:"spin 0.7s linear infinite",margin:"0 auto 14px"}}/><div style={{fontSize:13,fontWeight:700,color:C.primary}}>AIが解析中...</div><div style={{fontSize:11,color:C.text2,marginTop:4}}>数値・記載漏れ・フォーマットを確認しています</div></div>}
                {!analyzing&&!analyzed&&<div style={{textAlign:"center",padding:40,color:C.text3}}><div style={{fontSize:36,marginBottom:10}}>🔍</div><div style={{fontSize:13}}>レポートを読み込んで<br/>「AIで内容チェックを実行する」を押してください</div></div>}
                {!analyzing&&analyzed&&!showDefects&&<div style={{textAlign:"center",color:C.green,fontSize:13,padding:40,fontWeight:700}}><div style={{fontSize:36,marginBottom:10}}>✅</div>不具合は検知されませんでした</div>}
                {!analyzing&&showDefects&&(
                  <div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
                      {[{n:BM_DEFECTS.length,l:"合計",c:C.primary,bg:C.primaryL},{n:3,l:"重大",c:C.red,bg:C.redL},{n:3,l:"中程度",c:C.orange,bg:C.orangeL},{n:1,l:"軽微",c:C.purple,bg:C.purpleL}].map(k=>(
                        <div key={k.l} style={{borderRadius:10,padding:"9px 6px",textAlign:"center",background:k.bg}}><div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.n}</div><div style={{fontSize:10,color:C.text2}}>{k.l}</div></div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                      {[["all","すべて"],["numeric","数値異常"],["missing","記載漏れ"],["format","フォーマット"]].map(function(arr){
                        const t=arr[0];const l=arr[1];
                        const ac=t==="all"?C.primary:t==="numeric"?C.red:t==="missing"?C.orange:C.purple;
                        const abg=t==="all"?C.primaryL:t==="numeric"?C.redL:t==="missing"?C.orangeL:C.purpleL;
                        return <button key={t} onClick={()=>setFilter(t)} style={{padding:"4px 11px",borderRadius:20,border:"1px solid "+(filter===t?ac:C.border),background:filter===t?abg:C.white,color:filter===t?ac:C.text2,fontWeight:filter===t?700:400,fontSize:11,cursor:"pointer"}}>{l}</button>;
                      })}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:280,overflowY:"auto"}}>
                      {filtered.map(d=>(
                        <div key={d.id} onClick={()=>setExpanded(function(e){const n={};Object.keys(e).forEach(function(k){n[k]=e[k];});n[d.id]=!e[d.id];return n;})}
                          style={{borderRadius:10,padding:"11px 13px",border:"1px solid "+TC[d.type].bd,background:TC[d.type].bg,cursor:"pointer",borderLeft:d.sev==="high"?"3px solid "+C.red:undefined}}>
                          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                            {d.sev==="high"&&<span>🔴</span>}
                            <Tag color={TC[d.type].tc} bg={TC[d.type].bg} style={{border:"1px solid "+TC[d.type].bd}}>{d.type==="numeric"?"数値異常":d.type==="missing"?"記載漏れ":"フォーマット"}</Tag>
                            <span style={{fontSize:10,fontWeight:700,color:d.sev==="high"?C.red:d.sev==="medium"?C.orange:C.text2,marginLeft:"auto"}}>{d.sev==="high"?"重大":d.sev==="medium"?"中程度":"軽微"}</span>
                            <span style={{fontSize:10,color:C.text2}}>{d.id}</span>
                          </div>
                          <div style={{fontSize:11,lineHeight:1.6,marginBottom:4,color:C.text}}>{d.desc}</div>
                          <span style={{fontSize:10,color:C.text2,fontFamily:"monospace",background:"rgba(0,0,0,0.04)",borderRadius:4,padding:"2px 6px"}}>{d.loc}</span>
                          {expanded[d.id]&&<div style={{marginTop:8,padding:"8px 10px",background:C.greenL,borderRadius:6,fontSize:11,color:C.green}}>修正提案：{d.sug}</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </Card>
          </div>
          {showDefects&&(
            <Card>
              <CardHead title="不具合ハイライト表示" right={<span style={{fontSize:10,color:C.text2}}>マウスオーバーで詳細確認</span>}/>
              <div style={{padding:"14px 16px",fontSize:11,lineHeight:2.2,fontFamily:"monospace",whiteSpace:"pre-wrap",maxHeight:200,overflowY:"auto",background:C.bg}}>
                {renderHL().map((p,i)=>p.hl?<span key={i} title={p.desc} style={{background:TC[p.type].bg,borderBottom:"2px solid "+TC[p.type].tc,color:TC[p.type].tc,borderRadius:2,padding:"0 2px",cursor:"help"}}>{p.text}</span>:<span key={i}>{p.text}</span>)}
              </div>
              <div style={{display:"flex",gap:12,padding:"8px 16px",borderTop:"1px solid "+C.border,flexWrap:"wrap"}}>
                {[[C.redL,C.red,"数値異常"],[C.orangeL,C.orange,"記載漏れ"],[C.purpleL,C.purple,"フォーマット"]].map(function(arr){
                  return <div key={arr[2]} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:C.text2}}><div style={{width:10,height:10,borderRadius:2,background:arr[0],border:"1px solid "+arr[1]}}/><span>{arr[2]}</span></div>;
                })}
              </div>
            </Card>
          )}
        </div>
      )}
    </div>
  );
}

function Members({deptFilter}) {
  const filteredMembers=MEMBERS.filter(m=>deptFilter==="all"||m.dept===deptFilter);
  const [sel,setSel]=useState((filteredMembers[0]||MEMBERS[0]).name);
  const myIss=ISSUES_RAW.filter(i=>i.tan===sel);
  const statusCounts={};STATUS_KEYS.forEach(k=>{statusCounts[k]=0;});myIss.forEach(i=>{if(statusCounts[i.status]!==undefined)statusCounts[i.status]++;});
  return (
    <div style={{padding:28}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <h1 style={{fontSize:20,fontWeight:800,color:C.text}}>担当者別</h1>
        {deptFilter!=="all"&&<DeptTag dept={deptFilter}/>}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {filteredMembers.map(m=>{
          const open=ISSUES_RAW.filter(i=>i.tan===m.name&&i.status!=="完了"&&i.status!=="修繕完了報告済").length;
          return (
            <button key={m.name} onClick={()=>setSel(m.name)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid "+(sel===m.name?C.primary:C.border),background:sel===m.name?C.primaryL:C.white,color:sel===m.name?C.primary:C.text,fontSize:12,fontWeight:sel===m.name?700:400,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
              <Avatar name={m.name} size={24} color={sel===m.name?C.primary:C.text2} bg={sel===m.name?C.primaryL:C.border2}/>
              {m.name}<DeptTag dept={m.dept}/>
              {open>0&&<span style={{fontSize:10,background:C.redL,color:C.red,padding:"1px 7px",borderRadius:10,fontWeight:700}}>{open}</span>}
            </button>
          );
        })}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:18}}>
        <Kpi label="担当物件数" value={[...new Set(ISSUES_RAW.filter(i=>i.tan===sel).map(i=>i.bid))].length} sub="棟" color={C.primary} icon="🏢"/>
        <Kpi label="未完了件数" value={myIss.filter(i=>i.status!=="完了"&&i.status!=="修繕完了報告済").length} sub="件" color={C.red} icon="⚠️"/>
        <Kpi label="放置案件（3日超）" value={myIss.filter(i=>i.days>=3&&i.status!=="完了"&&i.status!=="修繕完了報告済").length} sub="件" color={C.orange} icon="⏰"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
        <Card>
          <CardHead title="ステータス内訳"/>
          <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:10}}>
            {STATUS_KEYS.map(k=>{
              const cnt=statusCounts[k];const pct=myIss.length>0?Math.round(cnt/myIss.length*100):0;const s=STATUS[k];
              return <div key={k}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,color:C.text}}>{k}</span><span style={{fontSize:12,fontWeight:700,color:s.color}}>{cnt}件</span></div><div style={{background:C.border2,borderRadius:99,height:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:99,background:s.color,width:pct+"%"}}/></div></div>;
            })}
          </div>
        </Card>
        <Card>
          <CardHead title="担当指摘事項一覧"/>
          <div style={{maxHeight:320,overflowY:"auto"}}>
            {myIss.length===0?<div style={{padding:32,textAlign:"center",color:C.text2,fontSize:13}}>指摘事項はありません</div>
            :myIss.map(iss=>{const bld=BUILDINGS.find(b=>b.id===iss.bid)||{};return(
              <div key={iss.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 18px",borderBottom:"1px solid "+C.border2}}>
                <SevDot sev={iss.sev}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,color:C.text2,marginBottom:1}}>{bld.name}</div>
                  <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{iss.title}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                  <StatusTag status={iss.status}/>
                  {iss.days>=3&&iss.status!=="完了"&&iss.status!=="修繕完了報告済"&&<span style={{fontSize:10,fontWeight:700,color:C.red}}>{iss.days}日放置</span>}
                </div>
              </div>
            );})}
          </div>
        </Card>
      </div>
    </div>
  );
}

function App() {
  const [page,setPage]=useState("dashboard");
  const [selBld,setSelBld]=useState(null);
  const [deptFilter,setDeptFilter]=useState("all");
  const [issueFilter,setIssueFilter]=useState("all");
  function renderPage(){
    if(page==="building_detail") return React.createElement(BuildingDetail,{buildingId:selBld,goBack:()=>setPage("buildings")});
    if(page==="dashboard")  return React.createElement(Dashboard,{setPage,setIssueFilter,deptFilter});
    if(page==="buildings")  return React.createElement(Buildings,{setPage,setSelBld,deptFilter});
    if(page==="issues")     return React.createElement(Issues,{deptFilter,initialFilter:issueFilter});
    if(page==="bm")         return React.createElement(BMCheck,{deptFilter});
    if(page==="members")    return React.createElement(Members,{deptFilter});
    return null;
  }
  return (
    <div style={{fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",display:"flex",minHeight:"100vh",background:C.bg}}>
      <Sidebar page={page} setPage={setPage} deptFilter={deptFilter} setDeptFilter={setDeptFilter}/>
      <div style={{marginLeft:220,flex:1,minHeight:"100vh",overflowY:"auto"}}>{renderPage()}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
